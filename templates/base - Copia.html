<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Clube - Sistema de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-danger border-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <span class="text-danger">🏍️</span> MOTO<span class="text-warning">CLUBE MAVERCIKS</span>
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Inicial</a>
                <a class="nav-link" href="/formulario">Cadastro</a>
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-warning text-center py-4 mt-5 border-top border-warning border-3">
        <p class="mb-0">© 2026 Mavericks Moto Clube System - Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
